# Volume OSD styling - matches this desktop's neon-cyan accent (same
# #00ffff used for the sway focused-window border and the wifi/bluetooth
# popups' hairline), so this reads as part of the same rice rather than a
# generic system default bar. Positioned bottom-center, the standard OSD
# placement that doesn't collide with the top waybar.
#
# No [section] header here on purpose - confirmed directly against wob
# 0.16's own source (src/config.c, handler()): global settings are parsed
# under section == "" (the implicit section before any [bracket] line),
# not a named "[default]" or "[main]" section - both of those were tried
# first and rejected live with "Unknown config section ...".
anchor = bottom
margin = 90
width = 320
height = 26
border_offset = 4
border_size = 2
bar_padding = 5
background_color = 0e1218E8
border_color = 00ffffBF
bar_color = 00ffffF2
# Only reachable if max were ever exceeded (it isn't - volume is clamped
# to 100 by the keybindings below) - kept as a visible "something's off"
# signal rather than silently reusing the normal bar color.
overflow_background_color = 1a0e12E8
overflow_border_color = ff453aBF
overflow_bar_color = ff453aF2
timeout = 1200
max = 100
