# SwayFX-only directives - these commands HARD-ERROR on vanilla sway, which
# is why they live in this separate file: the main config `include`s it, and
# a missing include is non-fatal (verified: sway --validate rc=0), so vanilla
# sway installs simply skip the eye candy instead of failing to load.
# setup.sh only installs this file when the sway binary reports swayfx.

# corner_radius rounds actual app windows (kitty, firefox, code...).
# It does NOT affect layer-shell surfaces (waybar/wofi/mako) - those get
# their rounding from their own CSS, already set to match (14-18px).
corner_radius 16
blur enable
blur_xray disable
blur_passes 2
blur_radius 4
shadows enable
shadow_blur_radius 24
shadow_color #00000066

# GTK Wi-Fi popup (waybar/wifi-popup): compositor blur + rounded clip for
# its layer-shell surface, matched to the panel's own 14px CSS radius.
layer_effects "wifi-popup" blur enable; shadows enable; corner_radius 14
