# Dedicated cava config for the waybar "now playing" module - deliberately
# NOT the default ~/.config/cava/config (that one's for the interactive
# terminal visualizer). Kept small and lean: only 8 bars at a low framerate
# since this renders as compact Unicode block characters in the bar text,
# not a full terminal-width graph, and only ever runs while media-
# visualizer.py has actually started it (see there) - not continuously.

[general]
bars = 8
framerate = 15
autosens = 1
sensitivity = 100

[input]
# PipeWire here exposes a full PulseAudio-compatible socket (confirmed via
# `pactl info` -> "Server Name: PulseAudio (on PipeWire ...)"), so cava's
# well-tested "pulse" input method works directly without needing its
# newer native pipewire backend.
method = pulse
source = auto

[output]
# Raw ASCII bar heights to stdout, one frame per line - the standard way
# to feed cava's levels into an external consumer instead of drawing its
# own terminal UI. bar_delimiter/frame_delimiter are decimal ASCII codes
# (confirmed against cava's own example config), not literal characters:
# 59 = ';' between bars, 10 = '\n' between frames.
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 7
bar_delimiter = 59
frame_delimiter = 10

[smoothing]
noise_reduction = 55
